<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="https://unpkg.com/@pqina/flip/dist/flip.min.css">

<style>

html, body {
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:transparent;
    overflow:hidden;
}


.clock {

    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);

    display:flex;
    align-items:center;
    justify-content:center;

}


/* taille des chiffres */
.tick {

    font-size:70px;
    font-family:Arial, Helvetica, sans-serif;

}


/* plaques chiffres */
.tick-flip {

    --background:#111111;
    --text-color:#ffffff;

}


/* enlever les effets jaunes */
.tick-flip-panel {

    background:#111111 !important;

}


.tick-flip-shadow {

    opacity:0.45;

}


/* séparateurs : sans plaque */
.separator {

    color:#ffffff;
    font-size:70px;
    font-weight:bold;
    margin:0 15px;
    line-height:1;

}

</style>

</head>


<body>


<div class="clock">


    <div class="tick" id="hours">
        <span data-view="flip"></span>
    </div>


    <div class="separator">:</div>


    <div class="tick" id="minutes">
        <span data-view="flip"></span>
    </div>


    <div class="separator">:</div>


    <div class="tick" id="seconds">
        <span data-view="flip"></span>
    </div>


</div>



<script src="https://unpkg.com/@pqina/flip/dist/flip.min.js"></script>


<script>


function startClock(id){

 return Tick.DOM.create(
        document.getElementById(id),
        {
            value:"00"
        }
    );

}


const hours = startClock("hours");
const minutes = startClock("minutes");
const seconds = startClock("seconds");



function updateClock(){


    let now = new Date();


    hours.value =
        String(now.getHours()).padStart(2,"0");


    minutes.value =
        String(now.getMinutes()).padStart(2,"0");


    seconds.value =
        String(now.getSeconds()).padStart(2,"0");


}


updateClock();

setInterval(updateClock,1000);


</script>


</body>
</html>
