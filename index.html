<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="https://unpkg.com/@pqina/flip/dist/flip.min.css">

<style>

html, body {
    margin:0;
    padding:0;
    background:transparent;
    overflow:hidden;
}


.clock {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}


/* taille générale */
.tick {
    font-size:70px;
    font-family:Arial, Helvetica, sans-serif;
}


/* plaques */
.tick-flip {

    --background: #111111;
    --text-color: #ffffff;

}


/* ombre légère */
.tick-flip-panel {

    background:#111111 !important;

}


.tick-flip-shadow {

    opacity:.5;

}

</style>

</head>


<body>


<div class="clock">

<div class="tick"
     data-did-init="setupFlip">


    <div data-repeat="true">

        <span data-view="flip"></span>

    </div>


</div>


</div>



<script src="https://unpkg.com/@pqina/flip/dist/flip.min.js"></script>



<script>


function setupFlip(tick) {


    function updateTime(){


        let d = new Date();


        let time =

        String(d.getHours()).padStart(2,"0")
        + ":" +
        String(d.getMinutes()).padStart(2,"0")
        + ":" +
        String(d.getSeconds()).padStart(2,"0");


        tick.value = time;


    }


    updateTime();


    Tick.helper.interval(updateTime,1000);


}



</script>


</body>
</html>
