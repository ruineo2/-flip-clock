<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="https://unpkg.com/@pqina/flip/dist/flip.min.css">

<style>

html, body {
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:transparent;
    overflow:hidden;
}


.clock {

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%, -50%);

    display:flex;
    justify-content:center;
    align-items:center;

}


/* taille de l'horloge */
.tick {

    font-size:70px;
    font-family:Arial, Helvetica, sans-serif;

}


/* couleurs */
.tick-flip {

    --background:#111111;
    --text-color:#ffffff;

}


/* plaques noires */
.tick-flip-panel {

    background:#111111 !important;

}


/* ombres */
.tick-flip-shadow {

    opacity:.45;

}

</style>

</head>


<body>


<div class="clock">

    <div class="tick"
         data-did-init="setupFlip">

        <div data-repeat="true">
            <span data-view="flip"></span>
        </div>

    </div>

</div>



<script src="https://unpkg.com/@pqina/flip/dist/flip.min.js"></script>



<script>

function setupFlip(tick) {


    function updateTime() {

        const now = new Date();


        const time =

        String(now.getHours()).padStart(2,"0")
        + ":" +
        String(now.getMinutes()).padStart(2,"0")
        + ":" +
        String(now.getSeconds()).padStart(2,"0");


        tick.value = time;

    }


    updateTime();


    Tick.helper.interval(updateTime,1000);


}

</script>


</body>
</html>
